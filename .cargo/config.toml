# Windows installers select x86_64-pc-windows-gnu through CARGO_BUILD_TARGET.
# Do not set [build].target here: cargo install reads this file on Linux/macOS
# too, and a global Windows target breaks native Unix installs.
[target.x86_64-pc-windows-gnu]
linker = "D:/software/gcc/mingw64/bin/gcc.exe"
ar = "D:/software/gcc/mingw64/bin/ar.exe"
